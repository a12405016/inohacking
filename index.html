<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Hacking...</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
    font-family: "Courier New", monospace;
  }

  .screen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh; /* モバイルのアドレスバー分を除いた実表示高さ */
    overflow: hidden;
    touch-action: none;
  }

  .photo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('photo.jpeg');
    background-size: cover;
    background-position: center 15%;
    transform-origin: 39% 22%;
    transform: scale(1);
    transition: transform 2.5s ease-in-out, filter 2.5s ease-in-out;
    filter: brightness(0.75) contrast(1.05);
  }

  .photo.zoom {
    transform: scale(3.6);
    filter: brightness(0.9) contrast(1.1) saturate(1.1);
  }

  .scanline {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,70,0.04) 0px,
      rgba(0,255,70,0.04) 1px,
      transparent 2px,
      transparent 3px
    );
    mix-blend-mode: screen;
  }

  .vignette {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.85);
  }

  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 40px 24px 60px;
    box-sizing: border-box;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 20%, rgba(0,0,0,0));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 5;
  }

  .status-text {
    color: #00ff5f;
    font-size: clamp(16px, 4.5vw, 26px);
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(0,255,95,0.8), 0 0 2px #00ff5f;
    animation: blink 0.9s steps(1) infinite;
  }

  .status-text.done {
    animation: none;
    color: #ff2b2b;
    text-shadow: 0 0 10px rgba(255,40,40,0.9);
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }

  .bar-wrap {
    width: min(520px, 85vw);
    height: 22px;
    border: 2px solid #00ff5f;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(0,255,95,0.6);
    padding: 3px;
    box-sizing: border-box;
    background: rgba(0,20,0,0.5);
  }

  .bar-wrap.done {
    border-color: #ff2b2b;
    box-shadow: 0 0 12px rgba(255,40,40,0.7);
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: repeating-linear-gradient(
      45deg,
      #00ff5f,
      #00ff5f 8px,
      #00cc4a 8px,
      #00cc4a 16px
    );
    border-radius: 2px;
    transition: width 3s linear, background 0.4s ease;
  }

  .bar-fill.done {
    background: repeating-linear-gradient(
      45deg,
      #ff2b2b,
      #ff2b2b 8px,
      #cc0000 8px,
      #cc0000 16px
    );
  }

  .percent {
    color: #00ff5f;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.9;
  }

  .percent.done {
    color: #ff2b2b;
  }
</style>
</head>
<body>

<div class="screen">
  <div class="photo" id="photo"></div>
  <div class="scanline"></div>
  <div class="vignette"></div>

  <div class="overlay">
    <div class="status-text" id="statusText">あなたのデバイスをハッキング中...</div>
    <div class="bar-wrap" id="barWrap">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="percent" id="percentText">0%</div>
  </div>
</div>

<script>
  const barFill = document.getElementById('barFill');
  const statusText = document.getElementById('statusText');
  const barWrap = document.getElementById('barWrap');
  const percentText = document.getElementById('percentText');
  const photo = document.getElementById('photo');

  function requestFS() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) {
      try { req.call(el); } catch (e) { /* ユーザー操作を伴わない場合ブラウザにより失敗することがある */ }
    }
  }

  function startSequence() {
    // start bar fill
    requestAnimationFrame(() => {
      barFill.style.width = '100%';
    });

    // percentage counter in sync (approx 3s)
    let pct = 0;
    const interval = setInterval(() => {
      pct += 2;
      if (pct >= 100) {
        pct = 100;
        clearInterval(interval);
      }
      percentText.textContent = pct + '%';
    }, 60);

    // after 3s -> done state
    setTimeout(() => {
      statusText.textContent = 'ハッキング完了';
      statusText.classList.add('done');
      barWrap.classList.add('done');
      barFill.classList.add('done');
      percentText.classList.add('done');
      percentText.textContent = '100%';

      // zoom into face shortly after completion
      setTimeout(() => {
        photo.classList.add('zoom');
      }, 500);
    }, 3000);
  }

  // 読み込み直後に自動開始（NFCタグ経由での起動を想定）
  requestFS();
  startSequence();

  // 一部ブラウザはジェスチャーなしのfullscreen要求を拒否するため、
  // 最初のタッチ/クリックでも念のため再試行する
  document.addEventListener('touchstart', requestFS, { once: true, passive: true });
  document.addEventListener('click', requestFS, { once: true });
</script>

</body>
</html>
